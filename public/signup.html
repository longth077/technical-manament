<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký - Quản lý Kỹ thuật</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="logo-icon">⚙️</div>
        <h1>QUẢN LÝ KỸ THUẬT</h1>
        <span class="subtitle">Technical Management System</span>
        <p>Tạo tài khoản mới</p>
      </div>

      <div id="alert" class="alert alert-error" role="alert"></div>

      <form id="signupForm" novalidate>
        <div class="form-group">
          <label for="fullName">Họ và tên</label>
          <input type="text" id="fullName" name="fullName" placeholder="Nhập họ và tên" required>
        </div>

        <div class="form-group">
          <label for="username">Tên đăng nhập</label>
          <input type="text" id="username" name="username" placeholder="Nhập tên đăng nhập" required autocomplete="username">
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Nhập địa chỉ email" required autocomplete="email">
        </div>

        <div class="form-group">
          <label for="password">Mật khẩu</label>
          <input type="password" id="password" name="password" placeholder="Nhập mật khẩu (tối thiểu 6 ký tự)" required autocomplete="new-password">
        </div>

        <div class="form-group">
          <label for="confirmPassword">Xác nhận mật khẩu</label>
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Nhập lại mật khẩu" required autocomplete="new-password">
        </div>

        <button type="submit" class="btn btn-primary" id="submitBtn">Đăng ký</button>
      </form>

      <div class="auth-footer">
        Đã có tài khoản? <a href="/signin.html">Đăng nhập</a>
      </div>
    </div>
  </div>

  <script src="/js/signup.js"></script>
</body>
</html>
