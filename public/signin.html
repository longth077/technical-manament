<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - Quản lý Kỹ thuật</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="logo-icon">⚙️</div>
        <h1>QUẢN LÝ KỸ THUẬT</h1>
        <span class="subtitle">Technical Management System</span>
        <p>Đăng nhập vào hệ thống</p>
      </div>

      <div id="alert" class="alert alert-error" role="alert"></div>

      <form id="signinForm" novalidate>
        <div class="form-group">
          <label for="username">Tên đăng nhập</label>
          <input type="text" id="username" name="username" placeholder="Nhập tên đăng nhập" required autocomplete="username">
        </div>

        <div class="form-group">
          <label for="password">Mật khẩu</label>
          <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary" id="submitBtn">Đăng nhập</button>
      </form>

      <div class="auth-footer">
        Chưa có tài khoản? <a href="/signup.html">Đăng ký</a>
      </div>
    </div>
  </div>

  <script src="/js/signin.js"></script>
</body>
</html>
