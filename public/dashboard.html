<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Quản lý Kỹ thuật</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="dashboard-body">
  <nav class="dashboard-nav">
    <div class="nav-brand">
      <span>⚙️</span>
      <span>QUẢN LÝ KỸ THUẬT</span>
    </div>
    <div class="nav-user">
      <span id="navUsername">Loading...</span>
      <button class="btn btn-logout btn-sm" id="logoutBtn">Đăng xuất</button>
    </div>
  </nav>

  <main class="dashboard-content">
    <div class="welcome-card">
      <h2 id="welcomeTitle">Chào mừng!</h2>
      <p>Hệ thống Quản lý Kỹ thuật — Trung tâm Công nghệ Xử lý Bom mìn</p>

      <div class="info-grid" id="userInfo">
        <div class="info-item">
          <div class="label">Tên đăng nhập</div>
          <div class="value" id="infoUsername">—</div>
        </div>
        <div class="info-item">
          <div class="label">Email</div>
          <div class="value" id="infoEmail">—</div>
        </div>
        <div class="info-item">
          <div class="label">Họ và tên</div>
          <div class="value" id="infoFullName">—</div>
        </div>
        <div class="info-item">
          <div class="label">Vai trò</div>
          <div class="value" id="infoRole">—</div>
        </div>
      </div>
    </div>
  </main>

  <script src="/js/dashboard.js"></script>
</body>
</html>
